openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for L2INT.RU Lineage 2 Database
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: ads
    description: Advertisement management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user info
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ads:
    get:
      operationId: listAds
      tags: [ads]
      summary: List all active ads
      parameters:
        - name: page
          in: query
          schema:
            type: string
          description: Filter ads by page name
        - name: position
          in: query
          schema:
            type: string
          description: Filter ads by position
      responses:
        "200":
          description: List of ads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ad"

  /ads/all:
    get:
      operationId: listAllAds
      tags: [ads]
      summary: List all ads including inactive (admin only)
      responses:
        "200":
          description: All ads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ad"

  /ads/{id}:
    get:
      operationId: getAd
      tags: [ads]
      summary: Get a single ad
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ad found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ad"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateAd
      tags: [ads]
      summary: Update an ad (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdBody"
      responses:
        "200":
          description: Updated ad
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ad"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteAd
      tags: [ads]
      summary: Delete an ad (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /ads/create:
    post:
      operationId: createAd
      tags: [ads]
      summary: Create a new ad (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdBody"
      responses:
        "201":
          description: Created ad
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ad"

  /ads/{id}/toggle:
    post:
      operationId: toggleAd
      tags: [ads]
      summary: Toggle ad active state (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Toggled ad
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ad"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginBody:
      type: object
      properties:
        login:
          type: string
        password:
          type: string
      required:
        - login
        - password

    AuthResponse:
      type: object
      properties:
        authenticated:
          type: boolean
        login:
          type: string
      required:
        - authenticated

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Ad:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        linkUrl:
          type: string
          nullable: true
        linkText:
          type: string
          nullable: true
        position:
          type: string
          description: "sidebar-top | sidebar-bottom | content-top | content-bottom | header | footer"
        active:
          type: boolean
        displayMode:
          type: string
          description: "all-pages | specific-pages"
        pages:
          type: array
          items:
            type: string
          description: "List of pages to show on when displayMode is specific-pages"
        maxShows:
          type: integer
          nullable: true
          description: "Max number of times to show per session (null = unlimited)"
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: "When the ad expires (null = never)"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - position
        - active
        - displayMode
        - pages
        - createdAt
        - updatedAt

    CreateAdBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        linkUrl:
          type: string
          nullable: true
        linkText:
          type: string
          nullable: true
        position:
          type: string
        active:
          type: boolean
        displayMode:
          type: string
        pages:
          type: array
          items:
            type: string
        maxShows:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
      required:
        - title
        - position

    UpdateAdBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        linkUrl:
          type: string
          nullable: true
        linkText:
          type: string
          nullable: true
        position:
          type: string
        active:
          type: boolean
        displayMode:
          type: string
        pages:
          type: array
          items:
            type: string
        maxShows:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
